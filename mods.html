<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Moderator Roles</title>
  
    <link rel="icon" href="../logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }
        html, body {
            height: 100%;
            overflow-y: auto;
        }
        body {
            background: #050505;
        }
        #orb-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons { top: 32px; right: 32px; gap: 18px; }
            .social-icons img { width: 26px; height: 26px; }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }
        .back-home {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 50;
            font-size: 14px;
            color: #71717a;
            transition: all 0.2s ease;
        }
        .back-home:hover { color: white; }
        .channel-card {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .channel-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.4);
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS -->
    <canvas id="orb-canvas"></canvas>

    <!-- BACK TO HOME -->
    <a href="/" class="back-home flex items-center gap-2">
        ← Back to TUK7
    </a>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank">
            <img src="../twitch.png" alt="Twitch">
        </a>
        <a href="https://x.com/tukfps" target="_blank">
            <img src="../twitter.png" alt="Twitter">
        </a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank">
            <img src="../discord.png" alt="Discord">
        </a>
    </div>

    <!-- CHANNELS SECTION – jetzt direkt oben (Hero komplett entfernt) -->
    <section class="pt-24 pb-24 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-bold tracking-tight">Channels I Moderate</h2>
            <p class="text-zinc-400 mt-3 text-lg">Currently <span id="channel-count" class="text-violet-400 font-semibold">0</span> Channels</p>
        </div>

        <div id="channels-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Cards werden hier eingefügt -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-8 text-center text-[10px] text-zinc-500 border-t border-zinc-900">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };

        // ORBS (identisch wie immer)
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = window.innerWidth < 768;

        class Orb { /* ... (genau der gleiche Orb-Code wie vorher) ... */ 
            constructor() { this.reset(); }
            reset() { /* ... */ }
            update() { /* ... */ }
            draw() { /* ... */ }
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            isMobileDevice = window.innerWidth < 768;
        }
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        // DEINE CHANNELS (hier eintragen)
        const myChannels = [
            { name: "CHANNEL NAME 1", link: "https://twitch.tv/channel1", desc: "Short description", since: "since 2024" },
            // ... mehr Channels hier
        ];

        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            myChannels.forEach(ch => {
                const card = document.createElement('a');
                card.href = ch.link; card.target = '_blank';
                card.className = 'channel-card group bg-zinc-900/70 border border-zinc-800 rounded-3xl overflow-hidden flex flex-col';
                card.innerHTML = `
                    <div class="h-48 bg-gradient-to-br from-violet-900/30 to-fuchsia-900/30 flex items-center justify-center">
                        <div class="w-24 h-24 bg-zinc-800 rounded-2xl flex items-center justify-center text-5xl font-black text-white/30">LOGO</div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <div class="flex items-center justify-between">
                            <h3 class="text-2xl font-semibold group-hover:text-violet-400">${ch.name}</h3>
                            <span class="px-4 py-1 text-xs font-medium bg-emerald-500/10 text-emerald-400 rounded-full">MODERATOR</span>
                        </div>
                        <p class="text-zinc-400 text-sm mt-2">${ch.desc}</p>
                        <div class="mt-auto pt-6 text-[10px] text-zinc-500">${ch.since}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('channel-count').textContent = myChannels.length;
        }

        // Init
        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        animate();
        renderChannels();
    </script>
</body>
</html>
