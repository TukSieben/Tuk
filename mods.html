<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Moderator Roles</title>
 
    <link rel="icon" href="../logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
     
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01J79KJRJR000F9JSA7DJTQMTZ/layer/01JAMR3FAWDKWNTKWGZGCDNSS4/3x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        html, body {
            height: 100%;
            overflow-y: auto;
        }
        body {
            background: #050505;
        }
        #orb-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons { top: 32px; right: 32px; gap: 18px; }
            .social-icons img { width: 26px; height: 26px; }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }
        .back-home {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 50;
            font-size: 14px;
            color: #71717a;
            transition: all 0.2s ease;
        }
        .back-home:hover { color: white; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
        }
        @media (min-width: 1024px) {
            .channel-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .channel-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .channel-card:hover {
            transform: translateY(-6px);
            border-color: #a5b4fc;
        }
        .profile-img {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 9999px;
            border: 4px solid #27272a;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS -->
    <canvas id="orb-canvas"></canvas>

    <!-- BACK TO HOME -->
    <a href="/" class="back-home flex items-center gap-2">
        ← Back to TUK7
    </a>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank"><img src="../twitch.png" alt="Twitch"></a>
        <a href="https://x.com/tukfps" target="_blank"><img src="../twitter.png" alt="Twitter"></a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank"><img src="../discord.png" alt="Discord"></a>
    </div>

    <!-- CHANNELS SECTION -->
    <section class="pt-24 pb-24 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12">
            
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight gif-text">Channels I Moderate</h1>
            
            <p class="text-zinc-400 mt-3 text-lg">My Partner Channels</p>
            <p class="text-zinc-400 text-sm">I currently moderate for <span class="text-violet-400 font-semibold">92 streamers</span> in total</p>
            
            <!-- GESAMT-FOLLOWER -->
            <div class="mt-6 inline-flex items-center gap-3 bg-zinc-900/80 px-8 py-4 rounded-3xl border border-zinc-700">
                <span class="text-sm text-zinc-400">I moderate for</span>
                <span id="total-followers" class="text-4xl font-bold text-violet-400">3,002,844</span>
                <span class="text-sm text-zinc-400">followers</span>
            </div>
        </div>

        <div id="channels-grid" class="channel-grid">
            <!-- Wird automatisch gefüllt -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-8 text-center text-[10px] text-zinc-500 border-t border-zinc-900">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };

        // ORBS + Render-Funktion (unverändert)
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = window.innerWidth < 768;

        class Orb { /* ... (gleicher Code wie vorher) ... */ 
            constructor() { this.reset(); }
            reset() { /* ... */ }
            update() { /* ... */ }
            draw() { /* ... */ }
        }

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; isMobileDevice = window.innerWidth < 768; }
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        // DEINE 6 STREAMER
        const myChannels = [
            { name: "Amar",        link: "https://twitch.tv/amar",        followers: "1,846,785", since: "Nov 25, 2025", image: "../st1.png" },
            { name: "Chefstrobel", link: "https://twitch.tv/chefstrobel", followers: "678,358",  since: "Feb 3, 2026",  image: "../st2.png" },
            { name: "marco_scm",   link: "https://twitch.tv/marco_scm",   followers: "410,554",  since: "Nov 13, 2025", image: "../st3.png" },
            { name: "Julistria",   link: "https://twitch.tv/julistria",   followers: "28,618",   since: "Dec 29, 2024", image: "../st4.png" },
            { name: "Lele",        link: "https://twitch.tv/lele",        followers: "24,174",   since: "Feb 28, 2025", image: "../st5.png" },
            { name: "Regy",        link: "https://twitch.tv/regy",        followers: "14,355",   since: "Feb 18, 2025", image: "../st6.png" }
        ];

        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            myChannels.forEach(ch => {
                const card = document.createElement('a');
                card.href = ch.link;
                card.target = '_blank';
                card.className = 'channel-card flex flex-col items-center text-center p-6';
                card.innerHTML = `
                    <img src="${ch.image}" class="profile-img mb-6">
                    <h3 class="text-2xl font-semibold">${ch.name}</h3>
                    <p class="text-emerald-400 font-medium mt-1">${ch.followers} followers</p>
                    <p class="text-xs text-zinc-400 mt-4">Mod since ${ch.since}</p>
                `;
                grid.appendChild(card);
            });
        }

        // Init
        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        animate();
        renderChannels();
    </script>
</body>
</html>
