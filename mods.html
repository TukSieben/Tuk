<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Moderator Roles</title>
  
    <!-- DEIN LOGO ALS FAVICON -->
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }
        html, body {
            height: 100%;
            overflow-y: auto;
        }
        body {
            background: #050505;
        }
        /* === ORBS CANVAS (exactly like your main page) === */
        #orb-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        /* === SOCIAL ICONS – identical === */
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons {
                top: 32px;
                right: 32px;
                gap: 18px;
            }
            .social-icons img {
                width: 26px;
                height: 26px;
            }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }
        /* BACK TO HOME (top left) */
        .back-home {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 50;
            font-size: 14px;
            color: #71717a;
            transition: all 0.2s ease;
        }
        .back-home:hover {
            color: white;
        }
        /* Channel Cards – premium like roles.tv */
        .channel-card {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .channel-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.4);
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS CANVAS -->
    <canvas id="orb-canvas"></canvas>

    <!-- BACK TO HOME -->
    <a href="index.html" class="back-home flex items-center gap-2">
        ← Back to TUK7
    </a>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank">
            <img src="twitch.png" alt="Twitch">
        </a>
        <a href="https://x.com/tukfps" target="_blank">
            <img src="twitter.png" alt="Twitter">
        </a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank">
            <img src="discord.png" alt="Discord">
        </a>
    </div>

    <!-- HERO -->
    <section class="min-h-screen flex flex-col items-center justify-center px-6 text-center relative">
        <div class="tilt-wrapper">
            <div id="tilt-content" class="tilt-content">
                <div class="-mt-8 sm:-mt-12 md:-mt-16">
                    <h1 class="gif-text text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-[-0.05em] leading-none">
                        TUK7
                    </h1>
                    <p class="mt-6 sm:mt-7 text-lg sm:text-xl md:text-2xl font-medium text-white">
                        TWITCH MODERATOR ROLES
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- MODERATOR CHANNELS SECTION -->
    <section class="px-6 pb-24 max-w-6xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-bold tracking-tight">Channels I Moderate</h2>
            <p class="text-zinc-400 mt-3 text-lg">Currently <span id="channel-count" class="text-violet-400 font-semibold">0</span> Channels</p>
        </div>

        <!-- GRID -->
        <div id="channels-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Your channels will appear here -->
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-8 text-center text-[10px] text-zinc-500 border-t border-zinc-900">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        // === 3D MOUSE TILT (only Desktop) ===
        const tiltContent = document.getElementById('tilt-content');
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.clientX) / 55;
                const y = (window.innerHeight / 2 - e.clientY) / 55;
                tiltContent.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
            document.addEventListener('mouseleave', () => {
                tiltContent.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        }

        // === ORBS (exactly like main page) ===
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = isMobile;

        class Orb {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * (isMobileDevice ? 4.2 : 5.5) + (isMobileDevice ? 1.8 : 2.8);
                this.speed = Math.random() * (isMobileDevice ? 0.22 : 0.35) + (isMobileDevice ? 0.08 : 0.15);
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.hue = 265 + Math.random() * 45;
                this.opacity = Math.random() * 0.28 + 0.13;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx + Math.sin(Date.now() / 1400 + this.phase) * (isMobileDevice ? 0.28 : 0.45);
                this.y += this.vy + Math.cos(Date.now() / 1100 + this.phase) * (isMobileDevice ? 0.18 : 0.3);
                if (this.x < -60) this.x = width + 60;
                if (this.x > width + 60) this.x = -60;
                if (this.y < -60) this.y = height + 60;
                if (this.y > height + 60) this.y = -60;
            }
            draw() {
                ctx.save();
                const layers = isMobileDevice 
                    ? [{ size: this.radius * 3.8, alpha: this.opacity * 0.07 }, { size: this.radius * 2.6, alpha: this.opacity * 0.12 }, { size: this.radius * 1.6, alpha: this.opacity * 0.20 }, { size: this.radius * 0.55, alpha: this.opacity * 0.68 }]
                    : [{ size: this.radius * 4.2, alpha: this.opacity * 0.06 }, { size: this.radius * 3.1, alpha: this.opacity * 0.09 }, { size: this.radius * 2.2, alpha: this.opacity * 0.15 }, { size: this.radius * 1.4, alpha: this.opacity * 0.22 }, { size: this.radius * 0.55, alpha: this.opacity * 0.65 }];
                for (let layer of layers) {
                    ctx.fillStyle = `hsla(${this.hue}, 90%, 72%, ${layer.alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layer.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            isMobileDevice = window.innerWidth < 768;
        }
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        // === YOUR MODERATOR CHANNELS (add as many as you want) ===
        const myChannels = [
            {
                name: "CHANNEL NAME 1",
                link: "https://twitch.tv/channel1",
                desc: "Short description or category",
                since: "since 2024"
            },
            {
                name: "CHANNEL NAME 2",
                link: "https://twitch.tv/channel2",
                desc: "Short description",
                since: "since 2023"
            }
            // Copy the block above to add more channels
        ];

        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            myChannels.forEach(ch => {
                const card = document.createElement('a');
                card.href = ch.link;
                card.target = '_blank';
                card.className = 'channel-card group bg-zinc-900/70 border border-zinc-800 rounded-3xl overflow-hidden flex flex-col';
                card.innerHTML = `
                    <div class="h-48 bg-gradient-to-br from-violet-900/30 to-fuchsia-900/30 flex items-center justify-center relative">
                        <div class="w-24 h-24 bg-zinc-800 rounded-2xl flex items-center justify-center text-5xl font-black text-white/30">LOGO</div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <div class="flex items-center justify-between">
                            <h3 class="text-2xl font-semibold group-hover:text-violet-400 transition-colors">${ch.name}</h3>
                            <span class="px-4 py-1 text-xs font-medium bg-emerald-500/10 text-emerald-400 rounded-full">MODERATOR</span>
                        </div>
                        <p class="text-zinc-400 text-sm mt-2 line-clamp-2">${ch.desc}</p>
                        <div class="mt-auto pt-6 text-[10px] text-zinc-500">${ch.since}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('channel-count').textContent = myChannels.length;
        }

        // Init everything
        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        animate();
        renderChannels();
    </script>
</body>
</html>
