<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Moderator Roles</title>
 
    <link rel="icon" href="../logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
     
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01J5V7WVKR0007BA288WXC38TK/layer/01JAMR3CE2TDB8GKKV1YPNMAYG/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        html, body {
            height: 100%;
            overflow-y: auto;
        }
        body {
            background: #050505;
        }
        #orb-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons { top: 32px; right: 32px; gap: 18px; }
            .social-icons img { width: 26px; height: 26px; }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }
        .back-home {
            position: fixed;
            top: 28px;
            left: 28px;
            z-index: 50;
            font-size: 14px;
            color: #71717a;
            transition: all 0.2s ease;
        }
        .back-home:hover { color: white; }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }
        
        /* CLEAN LAYOUT: Perfekte 3x3 Übersicht auf großen Bildschirmen (9 Karten) */
        @media (min-width: 1024px) {
            .channel-grid { 
                grid-template-columns: repeat(3, 1fr); 
            }
        }

        .channel-card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 20px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(60px) scale(0.82);
            transition: all 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .channel-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .channel-card:hover {
            transform: translateY(-6px);
            border-color: #71717a;
        }
        .profile-img {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 9999px;
            border: 4px solid #27272a;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS -->
    <canvas id="orb-canvas"></canvas>

    <!-- BACK TO HOME -->
    <a href="/" class="back-home flex items-center gap-2">
        ← Back to TUK7
    </a>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank"><img src="../twitch.png" alt="Twitch"></a>
        <a href="https://x.com/tukk7_" target="_blank"><img src="../twitter.png" alt="Twitter"></a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank"><img src="../discord.png" alt="Discord"></a>
    </div>

    <!-- CHANNELS SECTION -->
    <section class="pt-24 pb-24 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-12">
           
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight gif-text">Channels I Moderate</h1>
           
            <!-- Partner Channels mit Logo -->
            <div class="flex items-center justify-center gap-4 mt-4">
                <img src="partner.png" alt="Twitch Partner" class="h-9 md:h-11 w-auto">
                <p class="text-zinc-400 text-2xl md:text-3xl font-semibold tracking-tight">My Partner Channels</p>
            </div>

            <p class="text-zinc-400 mt-3 text-lg">I currently moderate for <span class="text-zinc-400 font-semibold">120+ streamers</span> in total</p>
            
            <!-- GESAMT-FOLLOWER -->
            <div class="mt-6 inline-flex items-center gap-3 bg-zinc-900/80 px-8 py-4 rounded-3xl border border-zinc-700">
                <span class="text-sm text-zinc-400">I moderate for</span>
                <span id="total-followers" class="text-4xl font-bold text-white">0</span>
                <span class="text-sm text-zinc-400">followers</span>
            </div>
        </div>

        <div id="channels-grid" class="channel-grid">
            <!-- Wird automatisch gefüllt -->
        </div>
    </section>

    <!-- VIEW ALL BUTTON -->
    <div class="text-center pb-6">
        <a href="https://mlu.terrance.cc/user/tuk7" 
           target="_blank"
           class="inline-flex items-center gap-2 text-sm text-zinc-400 hover:text-white transition-all duration-200 hover:underline underline-offset-4">
            all my moderated channels
            <span>↗</span>
        </a>
    </div>

    <!-- FOOTER -->
    <footer class="py-8 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved. • Made for the community
    </footer>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };

        // ORBS
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = window.innerWidth < 768;

        class Orb {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * (isMobileDevice ? 4.2 : 5.5) + (isMobileDevice ? 1.8 : 2.8);
                this.speed = Math.random() * (isMobileDevice ? 0.22 : 0.35) + (isMobileDevice ? 0.08 : 0.15);
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.hue = 200 + Math.random() * 40;
                this.opacity = Math.random() * 0.28 + 0.13;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx + Math.sin(Date.now() / 1400 + this.phase) * (isMobileDevice ? 0.28 : 0.45);
                this.y += this.vy + Math.cos(Date.now() / 1100 + this.phase) * (isMobileDevice ? 0.18 : 0.3);
                if (this.x < -60) this.x = width + 60;
                if (this.x > width + 60) this.x = -60;
                if (this.y < -60) this.y = height + 60;
                if (this.y > height + 60) this.y = -60;
            }
            draw() {
                ctx.save();
                const layers = isMobileDevice 
                    ? [{ size: this.radius * 3.8, alpha: this.opacity * 0.07 }, { size: this.radius * 2.6, alpha: this.opacity * 0.12 }, { size: this.radius * 1.6, alpha: this.opacity * 0.20 }, { size: this.radius * 0.55, alpha: this.opacity * 0.68 }]
                    : [{ size: this.radius * 4.2, alpha: this.opacity * 0.06 }, { size: this.radius * 3.1, alpha: this.opacity * 0.09 }, { size: this.radius * 2.2, alpha: this.opacity * 0.15 }, { size: this.radius * 1.4, alpha: this.opacity * 0.22 }, { size: this.radius * 0.55, alpha: this.opacity * 0.65 }];
                for (let layer of layers) {
                    ctx.fillStyle = `hsla(${this.hue}, 90%, 72%, ${layer.alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layer.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function resize() { 
            width = window.innerWidth; 
            height = window.innerHeight; 
            canvas.width = width; 
            canvas.height = height; 
            isMobileDevice = window.innerWidth < 768; 
        }
        
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        // PARTNER LIST (9 Kanäle – sortiert nach Follower-Anzahl absteigend)
        const myChannels = [
            { name: "Amar", link: "https://twitch.tv/amar", followers: "1,858,252", since: "Nov 25, 2025", image: "../st1.png" },
            { name: "noahreyli", link: "https://twitch.tv/noahreyli", followers: "792,077", since: "Apr 20, 2026", image: "../st9.png" },
            { name: "Chefstrobel", link: "https://twitch.tv/chefstrobel", followers: "679,731", since: "Feb 3, 2026", image: "../st2.png" },
            { name: "marco_scm", link: "https://twitch.tv/marco_scm", followers: "429,224", since: "Nov 13, 2025", image: "../st3.png" },
            { name: "LENA", link: "https://twitch.tv/lena", followers: "31,019", since: "Nov 16, 2024", image: "../st8.png" },
            { name: "Julistria", link: "https://twitch.tv/julistria", followers: "30,154", since: "Dec 29, 2024", image: "../st4.png" },
            { name: "Lele", link: "https://twitch.tv/lele", followers: "24,174", since: "Feb 28, 2025", image: "../st5.png" },
            { name: "Regy", link: "https://twitch.tv/regy", followers: "14,355", since: "Feb 18, 2025", image: "../st6.png" },
            { name: "Kanyuji", link: "https://twitch.tv/kanyuji", followers: "11,204", since: "May 18, 2025", image: "../st7.png" }
        ];

        function renderChannels() {
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = '';
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const index = parseInt(entry.target.dataset.index || 0);
                        const delay = index * 85;
                        
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, delay);
                        
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '0px 0px -50px 0px'
            });

            myChannels.forEach((ch, index) => {
                const card = document.createElement('a');
                card.href = ch.link;
                card.target = '_blank';
                card.className = 'channel-card flex flex-col items-center text-center p-6';
                card.dataset.index = index;
                card.innerHTML = `
                    <img src="${ch.image}" class="profile-img mb-6">
                    <h3 class="text-2xl font-semibold">${ch.name}</h3>
                    <p class="text-zinc-400 font-medium mt-1">${ch.followers} followers</p>
                    <p class="text-xs text-zinc-400 mt-4">Mod since ${ch.since}</p>
                `;
                grid.appendChild(card);
                observer.observe(card);
            });
        }

        // Force ALL cards to pop immediately on load (with nice stagger)
        function forceShowAllCards() {
            setTimeout(() => {
                document.querySelectorAll('.channel-card').forEach((card, index) => {
                    setTimeout(() => {
                        card.classList.add('visible');
                    }, index * 60);
                });
            }, 80);
        }

        function animateFollowers() {
            const el = document.getElementById('total-followers');
            const target = 4410700;
            let startTime = null;
            const duration = 2800;

            function update(currentTime) {
                if (!startTime) startTime = currentTime;
                const progress = Math.min((currentTime - startTime) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(target * eased);
                el.textContent = current.toLocaleString('en-US');

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    el.textContent = target.toLocaleString('en-US');
                }
            }
            requestAnimationFrame(update);
        }

        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        animate();
        renderChannels();
        forceShowAllCards();
        animateFollowers();
    </script>
</body>
</html>
