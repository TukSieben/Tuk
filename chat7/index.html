<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Chat7</title>
    <style>
        body { margin:0; background:transparent; font-family: Arial, sans-serif; overflow:hidden; }
        #chat { position:absolute; bottom:0; left:0; width:100%; max-height:100%; padding:10px; box-sizing:border-box; display:flex; flex-direction:column-reverse; gap:6px; }
        .message { display:flex; align-items:center; gap:8px; opacity:1; transition:opacity 0.4s; font-size:18px; color:#fff; text-shadow:0 2px 4px rgba(0,0,0,0.6); }
        .badge { height:20px; vertical-align:middle; }
        .username { font-weight:bold; margin-right:4px; }
        .emote { height:32px; vertical-align:middle; image-rendering:pixelated; }
        .text { white-space:pre-wrap; }
    </style>
</head>
<body>
    <div id="chat"></div>

    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/index.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const channel = (params.get('channel') || 'tuk7').toLowerCase();
        const fontSize = params.get('fontsize') || '18';
        const emoteSize = params.get('emotesize') || '32';
        const fadeTime = parseInt(params.get('fade') || '15') * 1000;

        const chat = document.getElementById('chat');
        const emoteMap = new Map();

        async function loadEmotes() {
            const idRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
            const idData = await idRes.json();
            const twitchId = idData?.data?.[0]?.id;
            if (!twitchId) return;

            const userRes = await fetch(`https://7tv.io/v3/users/twitch/${twitchId}`);
            const user = await userRes.json();
            if (user?.emote_sets) {
                user.emote_sets.forEach(set => {
                    set.emotes.forEach(e => {
                        emoteMap.set(e.name.toLowerCase(), `https://cdn.7tv.app/emote/${e.id}/4x.webp`);
                    });
                });
            }

            const globalRes = await fetch('https://7tv.io/v3/emote-sets/global');
            const global = await globalRes.json();
            global.emotes.forEach(e => {
                emoteMap.set(e.name.toLowerCase(), `https://cdn.7tv.app/emote/${e.id}/4x.webp`);
            });
        }

        function addMessage(tags, message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.style.fontSize = fontSize + 'px';

            if (tags.badges) {
                Object.keys(tags.badges).forEach(b => {
                    const img = document.createElement('img');
                    img.className = 'badge';
                    img.src = `https://badges.twitch.tv/v1/badges/${b}/${tags.badges[b]}/1`;
                    msgDiv.appendChild(img);
                });
            }

            const userSpan = document.createElement('span');
            userSpan.className = 'username';
            userSpan.style.color = tags.color || '#ff69b4';
            userSpan.textContent = tags['display-name'] + ': ';
            msgDiv.appendChild(userSpan);

            const textSpan = document.createElement('span');
            textSpan.className = 'text';
            message.split(' ').forEach(word => {
                const lower = word.toLowerCase();
                if (emoteMap.has(lower)) {
                    const img = document.createElement('img');
                    img.className = 'emote';
                    img.src = emoteMap.get(lower);
                    img.style.height = emoteSize + 'px';
                    textSpan.appendChild(img);
                } else {
                    textSpan.appendChild(document.createTextNode(word + ' '));
                }
            });
            msgDiv.appendChild(textSpan);

            chat.appendChild(msgDiv);

            setTimeout(() => {
                msgDiv.style.opacity = '0';
                setTimeout(() => msgDiv.remove(), 500);
            }, fadeTime);

            if (chat.children.length > 30) chat.removeChild(chat.lastChild);
        }

        const client = new tmi.Client({ channels: [channel] });
        client.connect();
        client.on('message', (ch, tags, message, self) => {
            if (self) return;
            addMessage(tags, message);
        });

        loadEmotes();
    </script>
</body>
</html>
