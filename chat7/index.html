<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TUK7 Chat7</title>
    <style>
        body { margin:0; background:transparent; font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; color:#fff; }
        #chat { position:absolute; bottom:0; left:0; width:100%; max-height:100%; padding:12px; box-sizing:border-box; display:flex; flex-direction:column-reverse; gap:8px; overflow-y:auto; scrollbar-width:none; }
        .message { display:flex; align-items:center; gap:8px; opacity:1; transition:opacity 0.6s ease-out; font-size:18px; line-height:1.3; text-shadow:0 2px 4px rgba(0,0,0,0.7); }
        .badge { height:20px; vertical-align:middle; }
        .username { font-weight:700; margin-right:6px; }
        .emote { height:32px; vertical-align:middle; image-rendering:pixelated; }
        .text { white-space:pre-wrap; }
    </style>
</head>
<body>
    <div id="chat"></div>

    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/index.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const channel = (params.get('channel') || 'ananassosse').toLowerCase();
        const fontSize = params.get('fontsize') || '18';
        const emoteSize = params.get('emotesize') || '32';
        const fadeTime = parseInt(params.get('fade') || '15') * 1000;

        const chat = document.getElementById('chat');
        const emoteMap = new Map();

        async function load7TV() {
            try {
                const idRes = await fetch(`https://api.ivr.fi/v2/twitch/user?login=${channel}`);
                const idData = await idRes.json();
                const twitchId = idData.data[0].id;

                const user = await (await fetch(`https://7tv.io/v3/users/twitch/${twitchId}`)).json();
                if (user.emote_sets) user.emote_sets.forEach(set => set.emotes.forEach(e => 
                    emoteMap.set(e.name.toLowerCase(), `https://cdn.7tv.app/emote/${e.id}/4x.webp`)
                ));

                const global = await (await fetch('https://7tv.io/v3/emote-sets/global')).json();
                global.emotes.forEach(e => emoteMap.set(e.name.toLowerCase(), `https://cdn.7tv.app/emote/${e.id}/4x.webp`));
            } catch(e) {}
        }

        function addMessage(tags, msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.style.fontSize = fontSize + 'px';

            if (tags.badges) Object.keys(tags.badges).forEach(b => {
                const img = document.createElement('img');
                img.className = 'badge';
                img.src = `https://badges.twitch.tv/v1/badges/${b}/${tags.badges[b]}/1`;
                div.appendChild(img);
            });

            const user = document.createElement('span');
            user.className = 'username';
            user.style.color = tags.color || '#ff69b4';
            user.textContent = tags['display-name'] + ': ';
            div.appendChild(user);

            const text = document.createElement('span');
            text.className = 'text';
            msg.split(' ').forEach(w => {
                if (emoteMap.has(w.toLowerCase())) {
                    const img = document.createElement('img');
                    img.className = 'emote';
                    img.src = emoteMap.get(w.toLowerCase());
                    img.style.height = emoteSize + 'px';
                    text.appendChild(img);
                } else {
                    text.appendChild(document.createTextNode(w + ' '));
                }
            });
            div.appendChild(text);

            chat.appendChild(div);

            setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 600); }, fadeTime);
            if (chat.children.length > 35) chat.removeChild(chat.firstChild);
        }

        const client = new tmi.Client({ channels: [channel] });
        client.connect();
        client.on('message', (ch, tags, message, self) => {
            if (self) return;
            addMessage(tags, message);
        });

        load7TV();
    </script>
</body>
</html>
