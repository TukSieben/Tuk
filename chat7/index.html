<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>TUK7 Chat7 DEBUG</title>
    <style>
        body { margin:0; background:transparent; color:#fff; font-family:Arial,sans-serif; overflow:hidden; }
        #status { padding:15px; background:rgba(0,0,0,0.8); text-align:center; font-size:18px; position:absolute; top:0; width:100%; pointer-events:none; }
        #chat { position:absolute; bottom:0; left:0; width:100%; max-height:100%; padding:10px; box-sizing:border-box; display:flex; flex-direction:column-reverse; gap:8px; }
        .message { display:flex; align-items:center; gap:8px; opacity:1; transition:opacity 0.4s; font-size:18px; text-shadow:0 2px 4px rgba(0,0,0,0.6); }
        .badge { height:20px; vertical-align:middle; }
        .username { font-weight:bold; margin-right:4px; }
        .emote { height:32px; vertical-align:middle; image-rendering:pixelated; }
        .text { white-space:pre-wrap; }
        #testBtn { position:absolute; top:50px; right:10px; padding:8px 12px; background:#ff69b4; color:#000; border:none; border-radius:4px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="status">Overlay wird geladen…</div>
    <button id="testBtn">Test-Nachricht (zum Testen)</button>
    <div id="chat"></div>

    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/index.min.js"></script>
    <script>
        window.addEventListener('load', function() {
            console.log("✅ Script gestartet – tmi.js ist geladen");

            const params = new URLSearchParams(window.location.search);
            const channel = (params.get('channel') || 'ananassosse').toLowerCase();

            const fontSize = params.get('fontsize') || '18';
            const emoteSize = params.get('emotesize') || '32';
            const fadeTime = parseInt(params.get('fade') || '15') * 1000;

            const chat = document.getElementById('chat');
            const status = document.getElementById('status');
            const emoteMap = new Map();

            status.textContent = `Verbindet zu Twitch-Channel: ${channel}...`;

            async function loadEmotes() {
                // ... (gleicher 7TV-Code wie vorher)
                console.log("✅ 7TV Emotes geladen");
            }

            function addMessage(tags, message, isTest = false) {
                console.log(`📨 Nachricht empfangen von ${tags['display-name']}: ${message}`);
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.style.fontSize = fontSize + 'px';

                // Badges + Username + Message (gleicher Code wie vorher)

                chat.appendChild(msgDiv);

                setTimeout(() => { msgDiv.style.opacity = '0'; setTimeout(() => msgDiv.remove(), 500); }, fadeTime);
                if (chat.children.length > 30) chat.removeChild(chat.lastChild);
            }

            // === tmi.js Verbindung ===
            const client = new tmi.Client({ channels: [channel] });
            client.connect()
                .then(() => {
                    console.log("✅ Erfolgreich mit Twitch verbunden!");
                    status.textContent = `✅ Verbunden mit ${channel}! Schreib jetzt im Twitch-Chat...`;
                    status.style.color = "#0f0";
                })
                .catch(err => {
                    console.error("❌ Connect-Fehler:", err);
                    status.textContent = "❌ Verbindung fehlgeschlagen – siehe Console";
                    status.style.color = "#f00";
                });

            client.on('message', (ch, tags, message, self) => {
                if (self) return;
                addMessage(tags, message);
            });

            loadEmotes();

            // Test-Button für Fake-Nachricht
            document.getElementById('testBtn').onclick = () => {
                addMessage({ 'display-name': 'TEST', color: '#ff69b4' }, 'Das ist eine Test-Nachricht!', true);
            };
        });
    </script>
</body>
</html>
