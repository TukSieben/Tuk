<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Settings - TUK</title>
    <link rel="icon" type="image/png" href="../../fav.png">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="dark-theme">
    <svg style="display: none;">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>
    <div class="noise"></div>
    <div class="custom-cursor"></div>
    <header>
        <nav>
            <a href="../../index.html" class="back-link">←</a>
            <ul class="nav-links">
                <li><a href="../valorant/index.html" class="nav-link active">Valorant</a></li>
                <li><a href="../davinci/index.html" class="nav-link">DaVinci Resolve</a></li>
                <li><a href="../topaz/index.html" class="nav-link">Topaz Video AI</a></li>
                <li><a href="../rawaccel/index.html" class="nav-link">RawAccel</a></li>
                <li><a href="../crosshairs/index.html" class="nav-link">Crosshairs</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="valorant">
            <h2>Valorant Settings</h2>
            
            <div class="accordion-container">
                <!-- Category: Graphics -->
                <div class="accordion-item">
                    <button class="accordion-header">Graphics Settings</button>
                    <div class="accordion-content">
                        <div class="settings-card">
                            <div class="settings-image">
                                <img src="graphics.png" alt="Valorant Graphics Settings">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Category: Sensitivity -->
                <div class="accordion-item">
                    <button class="accordion-header">Sensitivity</button>
                    <div class="accordion-content">
                        <div class="settings-card">
                            <div class="settings-image small-img">
                                <img src="sens.png" alt="Valorant Sensitivity Settings">
                            </div>
                            <p class="settings-note">1600 DPI | Note: I am using <strong>RawAccel</strong> for my sensitivity curve.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TUK7.XYZ</p>
    </footer>

    <script src="../main_script.js"></script>
    <script>
        // Custom Cursor Logic
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const links = document.querySelectorAll('a, button');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(2.5)';
                cursor.style.mixBlendMode = 'difference';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.mixBlendMode = 'normal';
            });
        });

        // Accordion Logic
        const accordionHeaders = document.querySelectorAll('.accordion-header');
        accordionHeaders.forEach(header => {
            header.addEventListener('click', () => {
                const item = header.parentElement;
                item.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
