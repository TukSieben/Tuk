<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
 
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
     
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Sanftes Umgebungslicht im Hintergrund */
        .ambient-light {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(120, 119, 198, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            top: -20vw;
            left: -10vw;
            z-index: -1;
            filter: blur(100px);
            animation: drift 20s ease-in-out infinite alternate;
        }

        .ambient-light-2 {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0) 60%);
            bottom: -10vw;
            right: -5vw;
            z-index: -1;
            filter: blur(80px);
            animation: drift 25s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(10%, 5%); }
        }

        /* Professionelle Typografie */
        .hero-title {
            font-weight: 800;
            letter-spacing: -0.04em;
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            filter: saturate(0.8); /* Weniger knallig, seriöser */
        }

        /* 3D-Container (sehr subtil) */
        .tilt-wrapper {
            perspective: 1200px;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 4rem 6rem;
            transition: transform 0.2s ease-out;
        }

        /* Clean Buttons */
        .nav-link {
            transition: all 0.3s ease;
            opacity: 0.5;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .nav-link img {
            width: 20px;
            height: 20px;
            filter: grayscale(1) invert(1);
        }

        /* O-Replace Animation */
        .o-replace {
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .o-replace:hover {
            transform: scale(1.1);
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>

    <div class="fixed top-8 left-8 flex gap-4 z-50 fade-in" style="animation-delay: 0.2s;">
        <a href="mods" class="nav-link">
            <img src="mod.png" alt="Mods">
        </a>
        <a href="https://img.tuk7.xyz/" target="_blank" class="nav-link">
            <img src="image.png" alt="Gallery">
        </a>
    </div>

    <div class="fixed top-8 right-8 flex gap-4 z-50 fade-in" style="animation-delay: 0.3s;">
        <a href="https://twitch.tv/tuk7" target="_blank" class="nav-link"><img src="twitch.png" alt="Twitch"></a>
        <a href="https://x.com/tukfps" target="_blank" class="nav-link"><img src="twitter.png" alt="Twitter"></a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank" class="nav-link"><img src="discord.png" alt="Discord"></a>
    </div>

    <main class="h-screen flex items-center justify-center p-6 tilt-wrapper">
        <div id="card" class="content-card text-center fade-in">
            <h1 class="hero-title text-6xl sm:text-7xl md:text-8xl lg:text-9xl mb-6">
                TUK7
            </h1>
            
            <div class="flex items-center justify-center gap-3 text-zinc-400 text-sm md:text-base font-medium tracking-[0.2em] uppercase">
                <span>Twitch</span>
                <span class="w-1 h-1 bg-zinc-700 rounded-full"></span>
                <span class="flex items-center text-white">
                    C
                    <img src="o.png" class="o-replace h-4 md:h-5 mx-1" alt="O">
                    mmunity
                </span>
                <span class="w-1 h-1 bg-zinc-700 rounded-full"></span>
                <span>Moderator</span>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-8 w-full text-center text-[10px] tracking-[0.3em] text-zinc-600 uppercase fade-in" style="animation-delay: 0.5s;">
        © 2026 TUK • Minimalist Interface
    </footer>

    <script>
        // CLEAN URL REDIRECT
        if (window.location.pathname.endsWith('/index.html')) {
            window.location.replace(window.location.origin + '/');
        }

        // ULTRA-SOFT TILT EFFECT
        const card = document.getElementById('card');
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                const rotateX = (window.innerHeight / 2 - e.clientY) / 70;
                const rotateY = (e.clientX - window.innerWidth / 2) / 70;
                
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            document.addEventListener('mouseleave', () => {
                card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            });
        }
    </script>
</body>
</html>
