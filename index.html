<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
    
    <!-- DEIN LOGO ALS FAVICON -->
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        .o-replace {
            height: 1.15em;
            width: auto;
            margin-bottom: 2px;
            vertical-align: middle;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #050505;
        }

        /* CLICK SCREEN */
        #splash {
            transition: opacity 0.8s ease-out;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- CLICK SCREEN (schwarzer Startbildschirm) -->
    <div id="splash" onclick="hideSplash()" 
         class="fixed inset-0 bg-black z-[9999] flex items-center justify-center cursor-pointer">
        <div class="text-center">
            <h1 class="text-7xl md:text-8xl font-black tracking-[-0.07em] text-white">
                CLICK ME
            </h1>
            <p class="mt-6 text-zinc-400 text-lg tracking-widest">to enter</p>
        </div>
    </div>

    <!-- HAUPTSEITE (erscheint nach Klick) -->
    <section class="h-screen flex flex-col items-center justify-center px-6 text-center">
        <div class="-mt-16">
            <h1 class="gif-text text-6xl md:text-7xl lg:text-8xl font-black tracking-[-0.05em] leading-none">
                TUK7
            </h1>
            
            <!-- Nur COMMUNITY mit o.png -->
            <p class="mt-6 text-xl font-medium text-white flex items-center justify-center gap-x-px">
                TWITCH C
                <img src="o.png" class="o-replace" alt="O">
                MMUNITY MODERATOR
            </p>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        function hideSplash() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            
            // Nach der Animation komplett entfernen
            setTimeout(() => {
                splash.style.display = 'none';
            }, 800);
        }
    </script>
</body>
</html>
