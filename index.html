<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01J79KJRJR000F9JSA7DJTQMTZ/layer/01JAMR3FAWDKWNTKWGZGCDNSS4/3x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <!-- TOP NAV – nur Logo + Twitch-Link (alles andere weg) -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-zinc-950/90 backdrop-blur-lg border-b border-violet-500/20">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="TUK7 Logo" class="h-9 w-auto">
                <span class="text-2xl font-black tracking-tighter text-violet-300">TUK7</span>
            </div>
            
            <a href="https://twitch.tv/tuk7" target="_blank" 
               class="text-sm font-medium hover:text-violet-400 transition-colors">
                Twitch
            </a>
        </div>
    </nav>

    <!-- HERO – nur das große TUK7 (alles andere entfernt) -->
    <section class="min-h-screen flex flex-col items-center justify-center pt-16 px-6 text-center">
        <div>
            <h1 class="gif-text text-6xl md:text-7xl lg:text-8xl font-black tracking-[-0.05em] leading-none">
                TUK7
            </h1>

            <p class="mt-6 text-xl font-medium text-violet-300">
                Twitch Community Moderator
            </p>
        </div>
    </section>

    <!-- NEUER FOOTER – genau wie gewünscht, mittig unten -->
    <footer class="py-12 text-center border-t border-zinc-800">
        <p class="text-zinc-400 text-base">© 2026 TUK | All rights reserved.</p>
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</body>
</html>
