<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
  
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }
        .o-replace {
            width: auto;
            vertical-align: middle;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #050505;
        }
        .tilt-wrapper {
            perspective: 1400px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tilt-content {
            transition: transform 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
        }
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons {
                top: 32px;
                right: 32px;
                gap: 18px;
            }
            .social-icons img {
                width: 26px;
                height: 26px;
            }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }

        /* === OME44 MODAL === */
        #ome44-modal {
            display: none;
        }
        #ome44-modal.active {
            display: flex !important;
        }
        #ome44-modal img {
            box-shadow: 0 0 80px rgba(236, 72, 153, 0.6);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0.6) rotate(-8deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS CANVAS -->
    <canvas id="orb-canvas" class="fixed inset-0 pointer-events-none z-[-1]"></canvas>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank">
            <img src="twitch.png" alt="Twitch">
        </a>
        <a href="https://x.com/tukfps" target="_blank">
            <img src="twitter.png" alt="Twitter">
        </a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank">
            <img src="discord.png" alt="Discord">
        </a>
    </div>

    <!-- HERO -->
    <section class="h-screen flex flex-col items-center justify-center px-6 text-center">
        <div class="tilt-wrapper">
            <div id="tilt-content" class="tilt-content">
                <div class="-mt-8 sm:-mt-12 md:-mt-16">
                    <h1 class="gif-text text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-[-0.05em] leading-none">
                        TUK7
                    </h1>
                  
                    <!-- SUBTITLE mit klickbarem O (jetzt als Button mit extra großer Klickfläche) -->
                    <p class="mt-6 sm:mt-7 text-lg sm:text-xl md:text-2xl font-medium text-white flex items-center justify-center gap-x-1 flex-wrap">
                        TWITCH 
                        <button id="ome44-trigger" 
                                type="button"
                                class="inline-flex items-center justify-center bg-transparent border-0 p-3 mx-0.5 cursor-pointer hover:scale-125 active:scale-95 transition-all duration-200 pointer-events-auto relative z-30 focus:outline-none">
                            <img src="o.png" 
                                 class="o-replace h-[22px] sm:h-[26px] md:h-[1.3em]" 
                                 alt="O">
                        </button>
                        MMUNITY
                        MODERATOR
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <!-- === OME44 MODUS POPUP === -->
    <div id="ome44-modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[999]">
        <div class="relative max-w-[92vw] max-h-[92vh]">
            <img src="ome44.gif" 
                 alt="OME44 MODE" 
                 class="max-w-full max-h-full rounded-2xl">
            
            <!-- Close Button -->
            <button onclick="closeOme44()" 
                    class="absolute -top-5 -right-5 bg-zinc-900 hover:bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center text-2xl shadow-xl transition-all">
                ✕
            </button>
        </div>
    </div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        // === 3D MOUSE TILT – nur Desktop ===
        const tiltContent = document.getElementById('tilt-content');
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;

        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.clientX) / 55;
                const y = (window.innerHeight / 2 - e.clientY) / 55;
                tiltContent.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
            document.addEventListener('mouseleave', () => {
                tiltContent.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        }

        // === ORBS (unverändert – läuft perfekt) ===
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [];
        let width, height;
        let isMobileDevice = isMobile;

        class Orb { /* ... (genau gleich wie vorher) ... */ 
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * (isMobileDevice ? 4.2 : 5.5) + (isMobileDevice ? 1.8 : 2.8);
                this.speed = Math.random() * (isMobileDevice ? 0.22 : 0.35) + (isMobileDevice ? 0.08 : 0.15);
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.hue = 265 + Math.random() * 45;
                this.opacity = Math.random() * 0.28 + 0.13;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.x += Math.sin(Date.now() / 1400 + this.phase) * (isMobileDevice ? 0.28 : 0.45);
                this.y += Math.cos(Date.now() / 1100 + this.phase) * (isMobileDevice ? 0.18 : 0.3);
                if (this.x < -60) this.x = width + 60;
                if (this.x > width + 60) this.x = -60;
                if (this.y < -60) this.y = height + 60;
                if (this.y > height + 60) this.y = -60;
            }
            draw() {
                ctx.save();
                const layers = isMobileDevice 
                    ? [{ size: this.radius * 3.8, alpha: this.opacity * 0.07 }, { size: this.radius * 2.6, alpha: this.opacity * 0.12 }, { size: this.radius * 1.6, alpha: this.opacity * 0.20 }, { size: this.radius * 0.55, alpha: this.opacity * 0.68 }]
                    : [{ size: this.radius * 4.2, alpha: this.opacity * 0.06 }, { size: this.radius * 3.1, alpha: this.opacity * 0.09 }, { size: this.radius * 2.2, alpha: this.opacity * 0.15 }, { size: this.radius * 1.4, alpha: this.opacity * 0.22 }, { size: this.radius * 0.55, alpha: this.opacity * 0.65 }];
                for (let layer of layers) {
                    ctx.fillStyle = `hsla(${this.hue}, 90%, 72%, ${layer.alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layer.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            isMobileDevice = window.innerWidth < 768;
        }
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        // === OME44 EASTER EGG – JETZT 100% Klickbar ===
        const omeTrigger = document.getElementById('ome44-trigger');
        const omeModal = document.getElementById('ome44-modal');

        function openOme44() {
            omeModal.classList.add('active');
        }
        function closeOme44() {
            omeModal.classList.remove('active');
        }

        // Klick + Touch für Handy
        omeTrigger.addEventListener('click', openOme44);
        omeTrigger.addEventListener('touchend', (e) => {
            e.preventDefault();
            openOme44();
        });

        // Modal schließen (außerhalb + ESC)
        omeModal.addEventListener('click', (e) => {
            if (e.target === omeModal) closeOme44();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && omeModal.classList.contains('active')) closeOme44();
        });

        // Init
        window.addEventListener('resize', () => {
            resize();
            initOrbs();
        });
        resize();
        initOrbs();
        animate();
    </script>
</body>
</html>
