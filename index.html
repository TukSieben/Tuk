<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="tuk – Twitch Community Moderator" />
  <title>tuk</title>

  <!-- Favicon / Taskbar Logo -->
  <link rel="icon" type="image/png" href="logo.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Cousine:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background layers -->
  <div class="bg-grid"   aria-hidden="true"></div>
  <div class="bg-radial" aria-hidden="true"></div>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar">
    <div class="nav-inner">
      <img class="nav-logo" src="logo.png" alt="tuk logo" width="28" height="28" />
      <span class="nav-name">tuk</span>
    </div>
  </nav>

  <main class="container">

    <!-- ═══ HERO ═══ -->
    <header class="hero">
      <div class="avatar-wrap">
        <img
          class="avatar"
          src="https://api.dicebear.com/9.x/shapes/svg?seed=tuk&backgroundColor=0d0d14"
          alt="tuk avatar"
          width="88"
          height="88"
        />
        <span class="avatar-badge" title="Online">●</span>
      </div>
      <div class="hero-text">
        <h1 class="hero-name">tuk<span class="accent-dot">.</span></h1>
        <p class="hero-sub">Twitch Community Moderator</p>
      </div>
    </header>

    <!-- ═══ SOCIALS ═══ -->
    <section id="socials">
      <h2 class="section-label">// socials</h2>
      <div class="link-grid">

        <a class="link-card" href="https://www.youtube.com/@tukfps" target="_blank" rel="noopener">
          <div class="lc-left">
            <svg class="lc-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            <span class="lc-name">youtube</span>
          </div>
          <span class="lc-handle">@tukfps</span>
        </a>

        <a class="link-card" href="https://www.twitch.tv/tuk7" target="_blank" rel="noopener">
          <div class="lc-left">
            <svg class="lc-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
            </svg>
            <span class="lc-name">twitch</span>
          </div>
          <span class="lc-handle">tuk7</span>
        </a>

        <a class="link-card" href="https://x.com/tukfps" target="_blank" rel="noopener">
          <div class="lc-left">
            <svg class="lc-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63z"/>
            </svg>
            <span class="lc-name">twitter / x</span>
          </div>
          <span class="lc-handle">@tukfps</span>
        </a>

      </div>
    </section>

    <!-- ═══ PROJECTS ═══ -->
    <section id="projects">
      <h2 class="section-label">// projects</h2>
      <a class="project-card" href="https://7database.com/" target="_blank" rel="noopener">
        <div class="project-header">
          <span class="project-title">7database<span class="project-ext">.com</span></span>
          <span class="badge-live">live ↗</span>
        </div>
        <p class="project-desc">Visit 7database.com to check it out.</p>
      </a>
    </section>

    <!-- ═══ FOOTER ═══ -->
    <footer class="footer">
      <span>© 2026 tuk</span>
      <span class="sep">/</span>
      <span>all rights reserved</span>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
