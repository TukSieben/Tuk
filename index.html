<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
    
    <!-- DEIN LOGO ALS FAVICON (oben in der Browser-Tab-Leiste) -->
    <link rel="icon" href="logo.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01J1AHQEMR000FQRZQPZ7GGZ82/layer/01JAMR2W0E0TVGQNYXZXNBH1XT/3x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #050505;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- HERO – höher positioniert + komplette Seite ohne Scroll -->
    <section class="h-screen flex flex-col justify-start pt-20 items-center px-6 text-center">
        <div>
            <h1 class="gif-text text-6xl md:text-7xl lg:text-8xl font-black tracking-[-0.05em] leading-none">
                TUK7
            </h1>

            <p class="mt-6 text-xl font-medium text-violet-300">
                Twitch Community Moderator
            </p>
        </div>
    </section>

    <!-- FOOTER – winzig klein ganz unten -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</body>
</html>
