<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
   
    <!-- DEIN LOGO ALS FAVICON -->
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
       
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }
        .o-replace {
            height: 1.15em;
            width: auto;
            margin-bottom: 2px;
            vertical-align: middle;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #050505;
        }

        /* === 3D MOUSE TILT (unverändert) === */
        .tilt-wrapper {
            perspective: 1400px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tilt-content {
            transition: transform 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
        }
        .tilt-content h1 {
            transform: translateZ(28px);
        }
        .tilt-content p {
            transform: translateZ(12px);
        }

        /* === SOCIAL ICONS – klein, clean & immer sichtbar oben rechts (wie auf hxdes.de) === */
        .social-icons {
            position: fixed;
            top: 32px;
            right: 32px;
            z-index: 50;
            display: flex;
            gap: 18px;
        }
        .social-icons a {
            transition: all 0.2s ease;
        }
        .social-icons img {
            width: 26px;   /* sehr klein & clean */
            height: 26px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">
    <!-- SOCIAL ICONS – direkt sichtbar, klein & clean oben rechts -->
    <div class="social-icons">
        <!-- Twitch -->
        <a href="https://twitch.tv/tuk7" target="_blank">
            <img src="twitch.png" alt="Twitch">
        </a>
        <!-- Twitter / X -->
        <a href="https://x.com/tukfps" target="_blank">
            <img src="twitter.png" alt="Twitter">
        </a>
        <!-- Discord -->
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank">
            <img src="discord.png" alt="Discord">
        </a>
    </div>

    <!-- HERO -->
    <section class="h-screen flex flex-col items-center justify-center px-6 text-center">
        <div class="tilt-wrapper">
            <div id="tilt-content" class="tilt-content">
                <div class="-mt-16">
                    <h1 class="gif-text text-5xl md:text-6xl lg:text-7xl font-black tracking-[-0.05em] leading-none">
                        TUK7
                    </h1>
                   
                    <p class="mt-6 text-xl font-medium text-white flex items-center justify-center gap-x-px">
                        TWITCH C
                        <img src="o.png" class="o-replace" alt="O">
                        MMUNITY MODERATOR
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        // === 3D MOUSE TILT (unverändert) ===
        const tiltContent = document.getElementById('tilt-content');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 55;
            const y = (window.innerHeight / 2 - e.clientY) / 55;
            tiltContent.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            tiltContent.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>
</body>
</html>
