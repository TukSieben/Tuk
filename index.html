<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
  
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }
        .o-replace {
            width: auto;
            vertical-align: middle;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: #050505;
        }
        .tilt-wrapper {
            perspective: 1400px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tilt-content {
            transition: transform 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
        }
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        @media (min-width: 768px) {
            .social-icons { top: 32px; right: 32px; gap: 18px; }
            .social-icons img { width: 26px; height: 26px; }
        }
        .social-icons img {
            width: 22px;
            height: 22px;
            filter: brightness(0.85);
            transition: all 0.2s ease;
        }
        .social-icons a:hover img {
            filter: brightness(1);
            transform: scale(1.15);
        }

        /* === MOD BUTTON === */
        .mod-button-small {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 50;
            transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .mod-button-small:hover {
            transform: scale(1.18);
        }

        /* === SPINNE + FADEN – PERFEKT SYNCHRON + STARTET OBEN AUSSERHALB === */
        #spider-container {
            position: fixed;
            top: 5px;
            left: 168px;
            z-index: 40;
            pointer-events: none;
        }
        .thread {
            width: 1.5px;
            background: rgba(163,163,163,0.3);
            margin: 0 auto;
            position: relative;
            height: 0px;                    /* STARTET KOMPLETT UNSICHTBAR */
            transition: height 2.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .spider {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(-220px); /* STARTET WEIT OBEN AUSSERHALB */
            font-size: 26px;
            bottom: -3px;
            pointer-events: auto;
            transition: transform 2.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- ORBS CANVAS -->
    <canvas id="orb-canvas" class="fixed inset-0 pointer-events-none z-[-1]"></canvas>

    <!-- SOCIAL ICONS -->
    <div class="social-icons">
        <a href="https://twitch.tv/tuk7" target="_blank"><img src="twitch.png" alt="Twitch"></a>
        <a href="https://x.com/tukfps" target="_blank"><img src="twitter.png" alt="Twitter"></a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank"><img src="discord.png" alt="Discord"></a>
    </div>

    <!-- MOD BUTTON -->
    <a href="mods" class="mod-button-small">
        <img src="mod.png" alt="My Moderator Roles" class="w-9 h-auto">
    </a>

    <!-- SPINNE AM NETZ (jetzt perfekt synchron + startet oben außerhalb) -->
    <div id="spider-container">
        <div class="thread">
            <div class="spider">🕷️</div>
        </div>
    </div>

    <!-- HERO -->
    <section class="h-screen flex flex-col items-center justify-center px-6 text-center">
        <div class="tilt-wrapper">
            <div id="tilt-content" class="tilt-content">
                <div class="-mt-8 sm:-mt-12 md:-mt-16">
                    <h1 class="gif-text text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black tracking-[-0.05em] leading-none">
                        TUK7
                    </h1>
                    <p class="mt-6 sm:mt-7 text-lg sm:text-xl md:text-2xl font-medium text-white flex items-center justify-center gap-x-1 flex-wrap">
                        TWITCH 
                        <span class="flex items-center whitespace-nowrap">
                            C
                            <img src="o.png" class="o-replace h-[22px] sm:h-[26px] md:h-[1.3em] mx-0.5" alt="O">
                            MMUNITY
                        </span>
                        MODERATOR
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="absolute bottom-6 left-0 right-0 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };

        // CLEAN URL REDIRECT
        if (window.location.pathname.endsWith('/index.html')) {
            window.location.replace(window.location.origin + '/');
        }

        // 3D TILT
        const tiltContent = document.getElementById('tilt-content');
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth / 2 - e.clientX) / 55;
                const y = (window.innerHeight / 2 - e.clientY) / 55;
                tiltContent.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            });
            document.addEventListener('mouseleave', () => tiltContent.style.transform = `rotateY(0deg) rotateX(0deg)`);
        }

        // ORBS
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = isMobile;

        class Orb {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * (isMobileDevice ? 4.2 : 5.5) + (isMobileDevice ? 1.8 : 2.8);
                this.speed = Math.random() * (isMobileDevice ? 0.22 : 0.35) + (isMobileDevice ? 0.08 : 0.15);
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.hue = 265 + Math.random() * 45;
                this.opacity = Math.random() * 0.28 + 0.13;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx + Math.sin(Date.now() / 1400 + this.phase) * (isMobileDevice ? 0.28 : 0.45);
                this.y += this.vy + Math.cos(Date.now() / 1100 + this.phase) * (isMobileDevice ? 0.18 : 0.3);
                if (this.x < -60) this.x = width + 60;
                if (this.x > width + 60) this.x = -60;
                if (this.y < -60) this.y = height + 60;
                if (this.y > height + 60) this.y = -60;
            }
            draw() {
                ctx.save();
                const layers = isMobileDevice 
                    ? [{ size: this.radius * 3.8, alpha: this.opacity * 0.07 }, { size: this.radius * 2.6, alpha: this.opacity * 0.12 }, { size: this.radius * 1.6, alpha: this.opacity * 0.20 }, { size: this.radius * 0.55, alpha: this.opacity * 0.68 }]
                    : [{ size: this.radius * 4.2, alpha: this.opacity * 0.06 }, { size: this.radius * 3.1, alpha: this.opacity * 0.09 }, { size: this.radius * 2.2, alpha: this.opacity * 0.15 }, { size: this.radius * 1.4, alpha: this.opacity * 0.22 }, { size: this.radius * 0.55, alpha: this.opacity * 0.65 }];
                for (let layer of layers) {
                    ctx.fillStyle = `hsla(${this.hue}, 90%, 72%, ${layer.alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layer.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function resize() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            isMobileDevice = window.innerWidth < 768;
        }
        function initOrbs() {
            orbs = [];
            const count = Math.max(5, Math.min(Math.floor(width / 105), 14));
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { orb.update(); orb.draw(); }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { resize(); initOrbs(); });
        resize();
        initOrbs();
        animate();

        // === SPINNE + FADEN SYNCHRON + STARTET AUSSERHALB ===
        const spiderContainer = document.getElementById('spider-container');
        const thread = spiderContainer.querySelector('.thread');
        const spider = spiderContainer.querySelector('.spider');
        let timeoutId = null;

        function resetToTop() {
            thread.style.height = '0px';
            spider.style.transform = 'translateX(-50%) translateY(-220px)';
        }

        function descend() {
            thread.style.height = '148px';
            spider.style.transform = 'translateX(-50%)';
        }

        function escape() {
            if (timeoutId) clearTimeout(timeoutId);
            resetToTop();
            timeoutId = setTimeout(() => {
                descend();
            }, 5000);
        }

        // Hover → beide klettern synchron nach oben raus
        spider.addEventListener('mouseenter', escape);

        // Beim Laden: erst komplett unsichtbar, dann synchron runterkommen
        window.addEventListener('load', () => {
            setTimeout(() => {
                descend();
            }, 900);
        });
    </script>
</body>
</html>
