<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01J79KJRJR000F9JSA7DJTQMTZ/layer/01JAMR3FAWDKWNTKWGZGCDNSS4/3x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
        }

        body {
            background: #050505;
        }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans">

    <!-- SUPER CLEAN TASKBAR – nur dein Logo klein oben links -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-lg border-b border-zinc-800">
        <div class="max-w-5xl mx-auto px-6 py-5 flex items-center">
            <img src="logo.png" alt="TUK7 Logo" class="h-8 w-auto">
        </div>
    </nav>

    <!-- HERO – nur TUK7 in der Mitte (maximaler Fokus) -->
    <section class="min-h-screen flex flex-col items-center justify-center pt-16 px-6 text-center">
        <div>
            <h1 class="gif-text text-6xl md:text-7xl lg:text-8xl font-black tracking-[-0.05em] leading-none">
                TUK7
            </h1>

            <p class="mt-6 text-xl font-medium text-violet-300">
                Twitch Community Moderator
            </p>
        </div>
    </section>

    <!-- FOOTER – winzig klein, ganz unten, ohne Strich -->
    <footer class="py-6 text-center text-[10px] text-zinc-500">
        © 2026 TUK | All rights reserved.
    </footer>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</body>
</html>
