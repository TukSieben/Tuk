<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tiktok/@tuk7_</title>
    <link rel="icon" type="image/png" href="fav.png">
    <link rel="stylesheet" href="main_styles.css">
</head>
<body class="main-page">
    <svg style="display: none;">
        <filter id="noiseFilter">
            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>
    <div class="noise"></div>
    <div class="custom-cursor"></div>
    <div class="landing-content">
        <div class="profile-container">
            <a href="https://www.tiktok.com/@tuk7_" target="_blank">
                <img src="tuk.png" alt="tuk" class="profile-pic">
            </a>
        </div>
        <h1 class="username">tuk</h1>
        <p class="description">wasted potential | looking for aim group</p>
        
        <div class="preview-container">
            <img src="vorschau.png" alt="Preview" class="main-preview-img">
            <p class="cta-text">do you want these graphics for your tiktok? check settings!</p>
        </div>

        <div class="main-nav">
            <a href="settings/valorant/index.html" class="enter-btn">Settings</a>
        </div>
    </div>
    <footer>
        <p>TUK7.XYZ | 2026</p>
    </footer>

    <script src="settings/main_script.js"></script>
    <script>
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Hover effect for links
        const links = document.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(2.5)';
                cursor.style.mixBlendMode = 'difference';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.mixBlendMode = 'normal';
            });
        });
    </script>
</body>
</html>
