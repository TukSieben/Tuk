<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUK7 • Twitch Mod</title>
 
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-in-up': 'fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                } 
            } 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
     
        html, body {
            height: 100%;
            overflow: hidden;
            background: #050505;
            color: #ffffff;
        }

        /* Hintergrundrauschen für einen edlen Textur-Look */
        .noise-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 7TV Animierter Text */
        .gif-text {
            background-image: url("https://cdn.7tv.app/paint/01K8MA8QWMWM1C3VFZ68H36WPH/layer/01KDP7PDDQV5X0DM0SD2KQN9F8/4x.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: transparent;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.2)); /* Leichtes violettes Glühen */
        }

        .o-replace {
            width: auto;
            vertical-align: middle;
            transition: transform 0.3s ease;
        }
        
        .o-replace:hover {
            transform: rotate(180deg);
        }

        /* 3D Tilt & Glassmorphism */
        .tilt-wrapper {
            perspective: 1400px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tilt-content {
            transition: transform 0.1s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 3rem 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateZ(30px); /* Hebt das Panel im 3D Raum an */
        }

        /* Navigation & Socials */
        .social-icons {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 50;
            display: flex;
            gap: 16px;
        }
        
        .top-left-group {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 50;
            display: flex;
            gap: 14px;
        }

        @media (min-width: 768px) {
            .social-icons { top: 32px; right: 32px; gap: 20px; }
            .top-left-group { top: 32px; left: 32px; gap: 20px; }
        }

        /* Icon Styles mit Tooltip */
        .icon-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .icon-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            filter: brightness(0.7) contrast(1.2);
            transition: all 0.3s ease;
        }
        
        /* Spezifische Größe für Mod-Icons falls nötig */
        .icon-btn.mod-btn img {
            width: 24px;
            height: 24px;
        }

        .icon-btn:hover {
            transform: translateY(-3px) scale(1.05);
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .icon-btn:hover img {
            filter: brightness(1) drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        /* CSS Tooltip */
        .tooltip {
            position: absolute;
            top: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(15, 15, 15, 0.9);
            color: #a1a1aa;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            white-space: nowrap;
        }

        .icon-btn:hover .tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="noise-bg"></div>

    <canvas id="orb-canvas" class="fixed inset-0 pointer-events-none z-[-2]"></canvas>

    <div class="top-left-group animate-fade-in" style="animation-delay: 0.2s;">
        <a href="mods" class="icon-btn mod-btn">
            <img src="mod.png" alt="My Moderator Roles">
            <span class="tooltip">MOD ROLES</span>
        </a>
        <a href="https://img.tuk7.xyz/" target="_blank" class="icon-btn mod-btn">
            <img src="image.png" alt="My Images">
            <span class="tooltip">GALLERY</span>
        </a>
    </div>

    <div class="social-icons animate-fade-in" style="animation-delay: 0.3s;">
        <a href="https://twitch.tv/tuk7" target="_blank" class="icon-btn">
            <img src="twitch.png" alt="Twitch">
            <span class="tooltip">TWITCH</span>
        </a>
        <a href="https://x.com/tukfps" target="_blank" class="icon-btn">
            <img src="twitter.png" alt="Twitter">
            <span class="tooltip">X / TWITTER</span>
        </a>
        <a href="https://discord.gg/rS8Z7UpCRC" target="_blank" class="icon-btn">
            <img src="discord.png" alt="Discord">
            <span class="tooltip">DISCORD</span>
        </a>
    </div>

    <section class="h-screen flex flex-col items-center justify-center px-6 text-center animate-fade-in">
        <div class="tilt-wrapper">
            <div id="tilt-content" class="tilt-content">
                <div class="glass-panel">
                    <h1 class="gif-text text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black tracking-tighter leading-none mb-4">
                        TUK7
                    </h1>
                 
                    <p class="text-lg sm:text-xl md:text-2xl font-semibold text-zinc-300 flex items-center justify-center gap-x-2 flex-wrap tracking-wide" style="transform: translateZ(20px);">
                        TWITCH
                        <span class="flex items-center whitespace-nowrap text-white">
                            C
                            <img src="o.png" class="o-replace h-[20px] sm:h-[24px] md:h-[28px] mx-[2px]" alt="O">
                            MMUNITY
                        </span>
                        MODERATOR
                    </p>
                </div>
            </div>
        </div>
    </section>

    <footer class="absolute bottom-6 left-0 right-0 text-center text-xs font-medium tracking-widest text-zinc-600 uppercase animate-fade-in" style="animation-delay: 0.5s;">
        © 2026 TUK <span class="mx-2 opacity-50">•</span> All rights reserved.
    </footer>

    <script>
        // CLEAN URL REDIRECT
        if (window.location.pathname.endsWith('/index.html')) {
            window.location.replace(window.location.origin + '/');
        }

        // 3D TILT EFFECT
        const tiltContent = document.getElementById('tilt-content');
        const isMobile = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        
        if (!isMobile) {
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.clientX) / 45; // Etwas sensibler für besseres Feel
                const yAxis = (window.innerHeight / 2 - e.clientY) / 45;
                tiltContent.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });
            // Soft reset beim Verlassen
            document.addEventListener('mouseleave', () => {
                tiltContent.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        }

        // UPGRADED ORBS BACKGROUND
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [], width, height, isMobileDevice = isMobile;

        class Orb {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * (isMobileDevice ? 50 : 80) + 20; // Größere, weichere Radien
                this.speed = Math.random() * 0.2 + 0.05;
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.hue = 260 + Math.random() * 50; // Lila / Blau Spektrum
                this.opacity = Math.random() * 0.15 + 0.05; // Dezentere Base-Opacity
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.x += this.vx + Math.sin(Date.now() / 2000 + this.phase) * 0.3;
                this.y += this.vy + Math.cos(Date.now() / 1500 + this.phase) * 0.3;
                
                // Weicher Wrap-Around
                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.save();
                ctx.globalCompositeOperation = 'screen'; // Macht Überschneidungen heller (Geiler Effekt)
                
                // Erstelle einen weichen Farbverlauf für die Orbs (Nebula Look)
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 90%, 65%, ${this.opacity})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 90%, 65%, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function resize() {
            width = window.innerWidth; 
            height = window.innerHeight;
            canvas.width = width; 
            canvas.height = height;
            isMobileDevice = window.innerWidth < 768;
        }

        function initOrbs() {
            orbs = [];
            const count = isMobileDevice ? 15 : 25; // Mehr Orbs, da sie jetzt weicher sind
            for (let i = 0; i < count; i++) orbs.push(new Orb());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let orb of orbs) { 
                orb.update(); 
                orb.draw(); 
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { 
            resize(); 
            initOrbs(); 
        });
        
        resize();
        initOrbs();
        animate();
    </script>
</body>
</html>
